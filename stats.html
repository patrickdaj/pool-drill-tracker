<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Stats — Pool Drill Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="stats.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1><a href="index.html" class="back-link">← </a>Stats</h1>
    <div class="header-actions">
      <select id="session-select" class="stats-session-select" aria-label="Select session"></select>
    </div>
  </div>
  <!-- Drill Type Tabs -->
  <div class="drill-type-bar stats-drill-tabs" id="stats-drill-type-tabs"></div>
  <!-- Stats Content -->
  <div class="stats-page">
    <!-- View Switcher -->
    <div class="stats-view-tabs">
      <button class="stats-view-tab active" data-view="session">Session</button>
      <button class="stats-view-tab" data-view="trending">Trending</button>
      <button class="stats-view-tab" data-view="history">History</button>
    </div>

    <!-- Wagon Wheel variant selector (shown only on WW stats) -->
    <div id="stats-wagon-variant" class="stats-wagon-variant" style="display:none"></div>

    <div class="stats-section">
      <div class="stats-section-title" id="stats-overview-title">Session Overview</div>
      <div class="stats-grid" id="stats-session-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">By Shot Type</div>
      <div class="stats-grid" id="stats-type-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">By Cut Angle</div>
      <div class="stats-grid stats-grid-angle" id="stats-angle-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">By Cut Direction</div>
      <div class="stats-grid" id="stats-cutdir-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">By Distance</div>
      <div class="stats-grid" id="stats-distance-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">By Rail</div>
      <div class="stats-grid stats-grid-4" id="stats-rail-grid"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Per-Ball Breakdown <span class="stats-hint">(tap to expand)</span></div>
      <div class="stats-ball-list" id="stats-ball-list"></div>
    </div>
    <div class="stats-section" id="stats-trends-section" style="display:none">
      <div class="stats-section-title">vs Previous Session</div>
      <div class="stats-grid" id="stats-trends-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script src="stats.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
      navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then((reg) => {
        reg.update();
      });
    }
  </script>
</body>
</html>
